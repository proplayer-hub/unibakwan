<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prabowo & Cat ✨</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(to top, #89f7fe, #66a6ff);
  }

  /* Floating background bubbles */
  .bubble {
    position: absolute;
    bottom: -50px;
    width: 20px;
    height: 20px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    animation: rise 10s infinite ease-in;
  }

  @keyframes rise {
    to {
      transform: translateY(-110vh);
      opacity: 0;
    }
  }

  .container {
    text-align: center;
    position: relative;
    top: 30%;
  }

  h1 {
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
  }

  .prabowo {
    font-size: 90px;
    animation: floaty 2s infinite ease-in-out;
    cursor: pointer;
  }

  .cat {
    font-size: 80px;
    margin-top: 10px;
    transition: transform 0.3s;
    cursor: pointer;
  }

  .cat:hover {
    transform: scale(1.2) rotate(10deg);
  }

  @keyframes floaty {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
  }

  .message {
    margin-top: 20px;
    color: white;
    font-size: 18px;
    opacity: 0.9;
  }

  .heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 3s linear forwards;
  }

  @keyframes floatUp {
    to {
      transform: translateY(-200px);
      opacity: 0;
    }
  }
</style>
</head>

<body>
  <img src="solo.jpg">
<div class="container">
  <h1>✨ Cute Moment ✨</h1>

  <div class="prabowo" onclick="spawnHearts()">🧑‍✈️</div>
  <div class="cat" onclick="meow()">🐱</div>

  <div class="message">Click them! 😆</div>
</div>

<script>
  // Floating bubbles background
  for (let i = 0; i < 25; i++) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.left = Math.random() * 100 + "vw";
    bubble.style.animationDuration = (5 + Math.random() * 5) + "s";
    bubble.style.width = bubble.style.height = (10 + Math.random() * 20) + "px";
    document.body.appendChild(bubble);
  }

  // Heart effect when clicking
  function spawnHearts() {
    for (let i = 0; i < 6; i++) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = (window.innerWidth/2 + (Math.random()*100 - 50)) + "px";
      heart.style.top = (window.innerHeight/2) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 3000);
    }
  }

  // Cat interaction
  function meow() {
    alert("Meow! 🐱💖");
  }
</script>

</body>
</html>
