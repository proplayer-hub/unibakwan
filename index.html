<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Money Chaos 💸✨</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    background: radial-gradient(circle, #1a2a6c, #000);
    color: white;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    text-shadow: 0 0 10px gold;
  }

  .character {
    font-size: 90px;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: wobble 0.5s infinite alternate;
    cursor: pointer;
  }

  @keyframes wobble {
    from { transform: translate(-50%, -50%) rotate(-5deg); }
    to { transform: translate(-50%, -50%) rotate(5deg); }
  }

  .money {
    position: absolute;
    font-size: 24px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0;
    }
  }

  .message {
    position: absolute;
    bottom: 20px;
    width: 100%;
    opacity: 0.8;
  }
</style>
</head>

<body>
  <img src="solo.jpg">

<h1>💸 TOO MUCH MONEY 💸</h1>

<div class="character" onclick="rainMoney()">🕺💰</div>

<div class="message">click the character 😆</div>

<script>
  function rainMoney() {
    for (let i = 0; i < 30; i++) {
      const money = document.createElement("div");
      money.className = "money";
      money.innerHTML = "💵";
      money.style.left = Math.random() * window.innerWidth + "px";
      money.style.top = "-20px";
      money.style.animationDuration = (2 + Math.random() * 3) + "s";
      document.body.appendChild(money);

      setTimeout(() => money.remove(), 5000);
    }
  }
</script>

</body>
</html>
</body>
</html>
